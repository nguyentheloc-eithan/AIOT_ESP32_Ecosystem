# Mosquitto MQTT Broker Configuration
# AIOT ESP32 Ecosystem

# Default listener
listener 1883
protocol mqtt

# WebSocket listener (for web clients)
listener 9001
protocol websockets

# Allow anonymous connections (disable in production)
# For development with MQTTX
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection messages
connection_messages true

# Message size limit (10MB)
message_size_limit 10485760

# ============================================
# Production Settings (uncomment for production)
# ============================================

# Authentication (uncomment and configure for production)
# password_file /mosquitto/config/password.txt
# allow_anonymous false

# TLS/SSL Configuration (uncomment for production)
# listener 8883
# cafile /mosquitto/config/certs/ca.crt
# certfile /mosquitto/config/certs/server.crt
# keyfile /mosquitto/config/certs/server.key
